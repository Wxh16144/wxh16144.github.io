<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Octokit } from '@octokit/core';
    import { Search, Github, FileCode, ExternalLink, RefreshCw, CheckCircle, Clock, AlertCircle } from 'lucide-react';

    const SearchBar = ({ searchText, setSearchText }) => (
      <div className="w-full md:w-72 lg:w-96 transition-all duration-300">
        <div className="relative">
          <input
            type="text"
            value={searchText}
            onChange={(e) => setSearchText(e.target.value)}
            placeholder="搜索关键词、语言..."
            className="w-full px-4 py-2 pl-10 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all"
          />
          <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-secondary w-4 h-4" />
        </div>
      </div>
    );

    const FilterBar = ({ activeLang, setActiveLang, languages }) => (
      <div className="container mx-auto px-4 py-2 flex flex-wrap gap-2 mb-2">
        <button
          onClick={() => setActiveLang('all')}
          className={`px-3 py-1 rounded-full text-sm transition ${activeLang === 'all' ? 'bg-primary text-white' : 'bg-gray-200 text-dark hover:bg-gray-300'}`}
        >
          全部
        </button>
        {languages.map(lang => (
          <button
            key={lang}
            onClick={() => setActiveLang(lang)}
            className={`px-3 py-1 rounded-full text-sm transition ${activeLang === lang ? 'bg-primary text-white' : 'bg-gray-200 text-dark hover:bg-gray-300'}`}
          >
            {lang}
          </button>
        ))}
      </div>
    );

    const RefreshButton = ({ onRefresh, loading, success, lastUpdateDate, variant = 'default' }) => {
      const [showSuccess, setShowSuccess] = useState(false);
      
      const isOutdated = useMemo(() => {
         if (!lastUpdateDate) return false;
         // Consider data outdated if older than 24 hours
         return (new Date() - new Date(lastUpdateDate)) > 1000 * 60 * 60 * 24;
      }, [lastUpdateDate]);

      useEffect(() => {
        if (success) {
          setShowSuccess(true);
          const timer = setTimeout(() => setShowSuccess(false), 3000);
          return () => clearTimeout(timer);
        }
      }, [success]);

      // Footer / Simple Icon style
      if (variant === 'simple') {
         return (
            <button 
              onClick={onRefresh} 
              disabled={loading || showSuccess}
              className={`flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium transition-all ${
                 loading ? 'text-white/50 cursor-wait' :
                 showSuccess ? 'text-green-400 bg-green-900/30' : 
                 'text-white/80 hover:text-white hover:bg-white/10'
              }`}
              title="同步最新数据"
            >
              {loading ? <RefreshCw className="w-3.5 h-3.5 animate-spin" /> : showSuccess ? <CheckCircle className="w-3.5 h-3.5" /> : <RefreshCw className="w-3.5 h-3.5" />}
              <span>{loading ? '同步中' : showSuccess ? '已同步' : '更新'}</span>
            </button>
         );
      }

      // Default Header Button Style
      let statusClasses = "";
      let icon = <RefreshCw className="w-4 h-4" />;
      let text = "同步最新";

      if (loading) {
         statusClasses = "bg-white text-secondary border-gray-200 cursor-wait";
         icon = <RefreshCw className="w-4 h-4 animate-spin" />;
         text = "更新中...";
      } else if (showSuccess) {
         statusClasses = "bg-green-50 text-green-600 border-green-200";
         icon = <CheckCircle className="w-4 h-4" />;
         text = "已更新";
      } else if (isOutdated) {
         // Outdated state: Orange/Warning color to fetch attention
         statusClasses = "bg-orange-50 text-orange-600 border-orange-200 hover:bg-orange-100 hover:shadow-md hover:-translate-y-0.5";
         icon = <AlertCircle className="w-4 h-4" />;
         text = "数据较陈旧，点此更新";
      } else {
         // Normal state
         statusClasses = "bg-white text-secondary border-gray-200 hover:text-primary hover:border-primary/30 hover:shadow-md hover:-translate-y-0.5";
         icon = <RefreshCw className="w-4 h-4" />;
         text = "同步数据";
      }

      return (
        <button
          onClick={onRefresh}
          disabled={loading || showSuccess}
          className={`flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-300 border shadow-sm ${statusClasses}`}
        >
          {icon} <span className="hidden sm:inline">{text}</span>
        </button>
      );
    };

    const Header = ({ title, searchText, setSearchText, activeLang, setActiveLang, languages, onRefresh, refreshLoading, refreshSuccess, lastUpdateDate }) => (
      <header className="bg-white card-shadow sticky top-0 z-30 transition-all">
        <div className="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
          <div className="flex items-center w-full md:w-auto justify-between">
            <div 
              className="flex items-center cursor-pointer hover:opacity-80 transition-opacity"
              onClick={() => { setSearchText(''); setActiveLang('all'); }}
            >
              <Github className="w-8 h-8 text-primary mr-3" />
              <h1 className="text-2xl font-bold text-dark truncate max-w-[200px] md:max-w-none">{title}</h1>
            </div>
            <div className="md:hidden">
               <RefreshButton onRefresh={onRefresh} loading={refreshLoading} success={refreshSuccess} lastUpdateDate={lastUpdateDate} />
            </div>
          </div>
          <div className="flex w-full md:w-auto items-center gap-4">
            <SearchBar searchText={searchText} setSearchText={setSearchText} />
            <div className="hidden md:block">
              <RefreshButton onRefresh={onRefresh} loading={refreshLoading} success={refreshSuccess} lastUpdateDate={lastUpdateDate} />
            </div>
          </div>
        </div>
        <FilterBar activeLang={activeLang} setActiveLang={setActiveLang} languages={languages} />
      </header>
    );

    const EmptyState = () => (
      <div className="container mx-auto px-4 py-20 text-center flex flex-col items-center">
        <FileCode className="w-16 h-16 text-gray-300 mb-4" />
        <h3 className="text-xl text-dark font-medium mb-2">未找到匹配的 Gist</h3>
        <p className="text-secondary">请尝试调整搜索关键词或筛选条件。</p>
      </div>
    );

    const GistCard = ({ gist }) => {
      const files = Object.values(gist.files);
      const firstFile = files[0];
      const gistLang = firstFile.language || 'Text';
      const gistDesc = gist.description || '无描述';
      
      const diffDays = Math.ceil(Math.abs(new Date() - new Date(gist.updated_at)) / (1000 * 60 * 60 * 24));
      const activeStyle = diffDays <= 7 ? "bg-green-100 text-green-700 border-green-200" : (diffDays <= 30 ? "bg-blue-50 text-blue-600 border-blue-100" : "bg-gray-50 text-gray-500 border-gray-100");
      const activeLabel = diffDays <= 7 ? "Recent" : (diffDays <= 30 ? "Active" : "");

      return (
        <div className={`bg-white rounded-xl card-shadow gist-card-hover overflow-hidden flex flex-col border-t-4 ${diffDays <= 7 ? 'border-t-green-500' : (diffDays <= 30 ? 'border-t-blue-400' : 'border-t-gray-200')}`}>
          <div className="p-6 flex-grow">
            <div className="flex justify-between items-start mb-3">
              <h3 className="text-lg font-semibold text-dark truncate w-3/4" title={gistDesc}>{gistDesc}</h3>
              <span className="px-2 py-1 bg-primary/10 text-primary text-xs rounded-full whitespace-nowrap">{gistLang}</span>
            </div>
            <div className="mb-4 space-y-1">
              {files.map((file, index) => (
                <div key={index} className="truncate">
                  <a href={file.raw_url} target="_blank" rel="noopener noreferrer" className="group inline-flex items-center text-sm text-secondary hover:text-primary transition-colors max-w-full">
                    <FileCode className="w-3 h-3 mr-2 flex-shrink-0 group-hover:text-primary" />
                    <span className="truncate">{file.filename}</span>
                    <ExternalLink className="w-3 h-3 ml-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0" />
                  </a>
                </div>
              ))}
            </div>
          </div>
          <div className="bg-gray-50 px-4 py-3 border-t border-gray-100 mt-auto">
            <div className="flex items-center justify-between gap-4">
               <div className="flex flex-col gap-0.5 text-[10px] text-gray-400">
                  <span className="flex items-center opacity-80">创建: {new Date(gist.created_at).toLocaleDateString('zh-CN')}</span>
                  <div className="flex items-center gap-2">
                     <span className={`flex items-center ${diffDays <= 30 ? 'text-gray-600 font-medium' : ''}`}>
                       更新: {new Date(gist.updated_at).toLocaleDateString('zh-CN')}
                     </span>
                     {activeLabel && <span className={`px-1.5 py-0.5 text-[9px] rounded border ${activeStyle}`}>{activeLabel}</span>}
                  </div>
               </div>
               <a href={gist.html_url} target="_blank" rel="noopener noreferrer" className="flex-shrink-0 flex items-center justify-center px-3 py-1.5 rounded-md bg-white border border-gray-200 text-xs text-gray-600 font-medium hover:text-primary hover:border-primary hover:shadow-sm transition-all">
                 <Github className="w-3.5 h-3.5 mr-1.5" />查看源码
               </a>
            </div>
          </div>
        </div>
      );
    };

    const GistList = ({ gists }) => (
      <div className="columns-1 md:columns-2 lg:columns-3 gap-6 px-2 pb-8">
        {gists.map(gist => <div key={gist.id} className="break-inside-avoid mb-6"><GistCard gist={gist} /></div>)}
      </div>
    );

    const Footer = ({ lastUpdate, onRefresh, loading, success }) => (
      <footer className="bg-dark text-white/90 py-3 fixed bottom-0 left-0 right-0 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] backdrop-blur-sm bg-dark/90 supports-[backdrop-filter]:bg-dark/80">
        <div className="container mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-2 text-xs sm:text-sm">
           <div className="opacity-75 flex items-center gap-2">
             <a href="https://github.com/wxh16144/gist-viewer" target="_blank" rel="noopener noreferrer" className="hover:text-white hover:underline transition-all font-medium">Gist Viewer</a>
             <span className="hidden sm:inline">|</span>
             <span className="hidden sm:inline">Pure Static Collection</span>
           </div>
           <div className="flex items-center gap-3 bg-white/5 rounded-full px-4 py-1 border border-white/10">
             <span className="opacity-70 hidden sm:inline">数据快照:</span>
             <span className="font-mono text-white/95">{lastUpdate}</span>
             <div className="h-3 w-px bg-white/20 mx-1"></div>
             <RefreshButton onRefresh={onRefresh} loading={loading} success={success} variant="simple" />
           </div>
        </div>
      </footer>
    );

    const App = () => {
      const { username, data: initialData, lastUpdate: initialUpdate } = window.GIST_CONFIG;
      const [gistData, setGistData] = useState(() => (initialData || []).sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at)));
      
      const [lastUpdateDisplay, setLastUpdateDisplay] = useState(initialUpdate);
      // Try to parse initial update time, fallback to now if invalid
      const [lastUpdateDate, setLastUpdateDate] = useState(() => {
          const d = new Date(initialUpdate);
          return isNaN(d.getTime()) ? new Date() : d;
      });

      const [isRefreshing, setIsRefreshing] = useState(false);
      const [refreshSuccess, setRefreshSuccess] = useState(false);
      const [activeLang, setActiveLang] = useState('all');
      const [searchText, setSearchText] = useState('');
      const [languages, setLanguages] = useState([]);

      const handleRefresh = async () => {
        if (!username) return alert("无法获取用户名");
        setIsRefreshing(true); setRefreshSuccess(false);
        try {
          const token = localStorage.getItem('GITHUB_TOKEN');
          const octokit = new Octokit(token ? { auth: token } : {});
          
          const res = await octokit.request('GET /users/{username}/gists', {
            username: username,
            per_page: 100
          });

          if (res.status !== 200) throw new Error(res.status);
          
          const newData = res.data;
          
          if (Array.isArray(newData)) {
            setGistData(newData.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at)));
            
            const now = new Date();
            setLastUpdateDisplay(now.toLocaleString('zh-CN') + ' (实时)');
            setLastUpdateDate(now);
            
            setRefreshSuccess(true);
          }
        } catch (e) { alert(`更新失败: ${e.message}`); } 
        finally { setIsRefreshing(false); }
      };

      useEffect(() => {
        const langSet = new Set();
        gistData.forEach(g => Object.values(g.files).forEach(f => { if(f.language) langSet.add(f.language); }));
        setLanguages(Array.from(langSet).sort());
      }, [gistData]);

      useEffect(() => {
        const p = new URLSearchParams(window.location.search);
        setActiveLang(p.get('lang') || 'all'); setSearchText(p.get('search') || '');
      }, []);

      useEffect(() => {
        const p = new URLSearchParams();
        if (activeLang !== 'all') p.set('lang', activeLang);
        if (searchText) p.set('search', searchText);
        window.history.replaceState({}, '', `${window.location.pathname}${p.toString() ? '?' + p.toString() : ''}`);
      }, [activeLang, searchText]);

      const filteredGists = gistData.filter(gist => {
        if (activeLang !== 'all' && !Object.values(gist.files).some(f => f.language === activeLang)) return false;
        if (searchText) {
          const content = `${gist.description || ''} ${Object.values(gist.files).map(f => f.language || '').join(' ')} ${Object.keys(gist.files).join(' ')}`.toLowerCase();
          if (!content.includes(searchText.toLowerCase())) return false;
        }
        return true;
      });

      return (
        <div className="flex flex-col min-h-screen">
          <Header title="Wxh16144 的 Gist 收藏集" 
            searchText={searchText} setSearchText={setSearchText}
            activeLang={activeLang} setActiveLang={setActiveLang} 
            languages={languages}
            onRefresh={handleRefresh} refreshLoading={isRefreshing} refreshSuccess={refreshSuccess}
            lastUpdateDate={lastUpdateDate}
          />
          <main className="container mx-auto px-4 py-8 flex-grow pb-24">
            {filteredGists.length === 0 ? <EmptyState /> : <GistList gists={filteredGists} />}
          </main>
          <Footer 
             lastUpdate={lastUpdateDisplay} 
             onRefresh={handleRefresh} 
             loading={isRefreshing} 
             success={refreshSuccess} 
          />
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
